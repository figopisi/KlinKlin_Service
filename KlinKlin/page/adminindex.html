<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KlinKlin Laundry App</title>

<style>

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Plus Jakarta Sans',sans-serif;
}

body{
background:#F4F8FB;
color:#053659;
}

/* ================= LANDING ================= */

#landing{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.circle{
width:350px;
height:350px;
background:linear-gradient(180deg,#05558E,#5A8196);
border-radius:50%;
position:absolute;
bottom:-120px;
left:-120px;
z-index:-1;
}

h1{
font-size:48px;
margin-bottom:10px;
}

p{
font-size:22px;
opacity:.7;
margin-bottom:20px;
}

.btn{
padding:12px 25px;
background:#05558E;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
text-decoration:none;
}

/* ================= ADMIN ================= */

#admin{
display:none;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 6px 18px rgba(0,0,0,.08);
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.primary{
background:#05558E;
color:white;
}

.danger{
background:#E74C3C;
color:white;
}

.edit{
background:#F1C40F;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#053659;
color:white;
}

.badge{
padding:5px 10px;
border-radius:20px;
color:white;
font-size:12px;
}

.proses{background:#F39C12;}
.selesai{background:#27AE60;}

.back{
margin-bottom:15px;
display:inline-block;
cursor:pointer;
color:#05558E;
font-weight:bold;
}

</style>
</head>

<body>

<!-- ================= LANDING PAGE ================= -->
<section id="landing">

<div class="circle"></div>

<h1>Selamat Datang!</h1>
<p>Pakai KlinKlin cucian anti numpuk</p>

<button class="btn" onclick="masukAdmin()">MASUK</button>

</section>


<!-- ================= ADMIN PAGE ================= -->
<section id="admin">

<div class="container">

<div class="back" onclick="kembaliLanding()">← Kembali</div>

<h1>🧺 Admin Dashboard KlinKlin</h1>

<div class="card">

<h3>Tambah Order</h3>

<input id="nama" placeholder="Nama Pelanggan">
<input id="layanan" placeholder="Layanan">
<select id="status">
<option value="Proses">Proses</option>
<option value="Selesai">Selesai</option>
</select>

<button class="primary" onclick="tambahOrder()">Tambah</button>

</div>

<div class="card">

<h3>Data Order</h3>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Layanan</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tableOrder"></tbody>
</table>

</div>

</div>
</section>

<script>

/* ================= PAGE SWITCH ================= */

function masukAdmin(){
document.getElementById("landing").style.display="none";
document.getElementById("admin").style.display="block";
}

function kembaliLanding(){
document.getElementById("admin").style.display="none";
document.getElementById("landing").style.display="flex";
}

/* ================= DATABASE ================= */

let orders = JSON.parse(localStorage.getItem("orders")) || [];

/* ================= CREATE ================= */

function tambahOrder(){

const nama=document.getElementById("nama").value;
const layanan=document.getElementById("layanan").value;
const status=document.getElementById("status").value;

if(!nama || !layanan){
alert("Isi data dulu!");
return;
}

orders.push({
id:Date.now(),
nama,
layanan,
status
});

saveData();
render();

document.getElementById("nama").value="";
document.getElementById("layanan").value="";
}

/* ================= READ ================= */

function render(){

const table=document.getElementById("tableOrder");
table.innerHTML="";

orders.forEach(o=>{

table.innerHTML+=`
<tr>
<td>${o.nama}</td>
<td>${o.layanan}</td>
<td>
<span class="badge ${o.status=='Proses'?'proses':'selesai'}">
${o.status}
</span>
</td>
<td>
<button class="edit" onclick="editOrder(${o.id})">Edit</button>
<button class="danger" onclick="hapusOrder(${o.id})">Hapus</button>
</td>
</tr>
`;

});

}

/* ================= UPDATE ================= */

function editOrder(id){

const order=orders.find(o=>o.id===id);

const namaBaru=prompt("Nama:",order.nama);
const layananBaru=prompt("Layanan:",order.layanan);
const statusBaru=prompt("Status (Proses/Selesai):",order.status);

if(!namaBaru||!layananBaru||!statusBaru) return;

orders=orders.map(o=>
o.id===id
? {...o,nama:namaBaru,layanan:layananBaru,status:statusBaru}
:o
);

saveData();
render();
}

/* ================= DELETE ================= */

function hapusOrder(id){

if(confirm("Hapus order?")){
orders=orders.filter(o=>o.id!==id);
saveData();
render();
}

}

/* ================= SAVE ================= */

function saveData(){
localStorage.setItem("orders",JSON.stringify(orders));
}

render();

</script>

</body>
</html>
