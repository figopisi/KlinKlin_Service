<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Plus Jakarta Sans', sans-serif;
  overflow: hidden;
  animation: fadeIn 0.8s ease;
}

.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
}

.circle{
  width:400px;
  height:400px;
  background:linear-gradient(180deg,#05558E,#5A8196);
  border-radius:50%;
  position:absolute;
  bottom:-100px;
  left:-100px;
}

h1{
  font-size:64px;
  color:#053659;
  text-shadow:0 4px 4px rgba(0,0,0,.25);
  margin-top:-40px; 
}

.hero img{
  width:358px;
  margin-bottom:20px;
  margin-top:-60px; 
  opacity:0;
  animation: fadeUp 1s ease forwards;
}

h1{
  font-size:64px;
  color:#053659;
  text-shadow:0 4px 4px rgba(0,0,0,.25);
  opacity:0;
  animation: fadeUp 1s ease forwards;
  animation-delay:0.5s;
}

p{
  font-size:32px;
  color:#053659;
  opacity:.5;
  margin:20px 0;
  opacity:0;
  animation: fadeUp 1s ease forwards;
  animation-delay:0.9s;
}

.masuk{
  color:#053659;
  font-size:32px;
  font-family:'Plus Jakarta Sans', sans-serif;
  font-weight:700;
  letter-spacing:6.4px;
  cursor:pointer;
  margin-top:10px;
  transition:0.3s;
  text-decoration: none;

  opacity:0;
  animation: fadeUp 1s ease forwards;
  animation-delay:1.6s; 

  transition:0.3s;
  transition: color 0.3s ease, transform 0.3s ease;
}

.masuk:hover{
  opacity:0.6;
  transform:translateY(-2px);
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

</style>
</head>

<body>

<div class="hero">

<div class="circle"></div>

<img src="../image/Logo.png">

<h1>Selamat Datang!</h1>
<p>Pakai KlinKlin cucian anti numpuk</p>

<a href="index.html" class="masuk">MASUK</a>

</div>

</body>
</html>
